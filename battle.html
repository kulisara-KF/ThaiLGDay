<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Mode</title>
    <!-- โหลด CSS ของหน้าต่อสู้แยกต่างหาก -->
    <link rel="stylesheet" href="battle-style.css">
</head>
<body>

    <!-- ปุ่มกลับไปหน้าหลัก AR -->
    <button id="btn-back-ar" onclick="returnToAR()">🔙 สะสมทรัพยากร</button>

    <!-- ==================== BATTLE ARENA ==================== -->
    <div id="battle-arena" class="arena-container">
        <!-- ฝั่งศัตรู (บอส) -->
        <div class="character-box enemy-side">
            <h3 id="enemy-name">จ้าวแห่งไวยากรณ์</h3>
            <div class="bar-container"><div id="enemy-hp-bar" class="health-bar"></div></div>
            <p class="hp-text">HP: <span id="enemy-hp-text">1000/1000</span></p>
            <div id="enemy-damage-float" class="floating-damage"></div>
        </div>

        <!-- ส่วนแสดงคำถาม -->
        <div class="quiz-box">
            <h2 id="question-text">คำถามจะปรากฏที่นี่...</h2>
            <div id="choices-container" class="choices-grid">
                <button class="choice-btn" onclick="onAnswerQuestion(true)">ก. คำตอบที่ถูก</button>
                <button class="choice-btn" onclick="onAnswerQuestion(false)">ข. คำตอบที่ผิด</button>
            </div>
        </div>

        <!-- ฝั่งผู้เล่น -->
        <div class="character-box player-side">
            <h3 id="player-name">ผู้กล้า</h3>
            <div class="bar-container"><div id="player-hp-bar" class="health-bar"></div></div>
            <p class="hp-text">HP: <span id="player-hp-text">500/500</span></p>
            <div class="bar-container"><div id="player-mana-bar" class="mana-bar"></div></div>
            <p class="hp-text">Mana: <span id="player-mana-text">0/5</span></p>
            <div id="player-damage-float" class="floating-damage"></div>
        </div>
    </div>

    <!-- ==================== CARD STACK ==================== -->
    <div class="card-stack-container">
        <h3>การ์ดพลัง (ใช้ Mana)</h3>
        <div id="card-hand" class="card-hand"></div>
    </div>

    <!-- โหลด Script ข้อมูลและระบบต่อสู้ -->
    <script src="data.js"></script> 
    <script src="battle-script.js"></script> 
</body>
</html>
