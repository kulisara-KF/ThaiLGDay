<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Thai Quiz</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <!-- โซนคำถาม -->
        <div id="quiz-section" class="panel">
            <h2 id="question-text">กำลังโหลดคำถาม...</h2>
            <div id="options-container" class="options-grid"></div>
        </div>

        <!-- โซนกาชา และ แลกเศษอักษร -->
        <div id="gacha-section" class="panel exchange-container">
            <h3>ศิลาจารึกแห่งปัญญา (สุ่มอักษร)</h3>
            <p>Gold: <span id="gold-count">0</span> | เศษอักษร: <span id="fragment-count">0</span>/100</p>
            
            <button id="gacha-btn" class="btn-primary">สุ่มกาชา (100 Gold)</button>
            <button id="exchange-btn" class="btn-secondary">ใช้ 100 เศษอักษรแลกการันตี</button>

            <div id="result-box" class="hidden result-box">
                <div id="new-char-display" class="char-glow">-</div>
                <p id="result-msg"></p>
            </div>
        </div>
        
        <!-- โซนมินิเกม (ปาอักษร) -->
        <div id="minigame-section" class="panel">
            <h3>มินิเกม: ปาลูกแก้วสะกดวิญญาณ</h3>
            <div id="game-area">
                <div id="target-letter">ก</div>
                <div id="magic-orb" class="hidden"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Game Scripts -->
    <script src="js/gameData.js"></script>
    <script src="js/app.js"></script>
    <script src="js/minigame.js"></script>
</body>
</html>
